services:
  postgres:
    image: postgres:15
    container_name: lebanonpricemap-postgres
    environment:
      POSTGRES_DB: wenarkhass_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./LebanonPriceMap.Server
      dockerfile: Dockerfile
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=wenarkhass_db;Username=postgres;Password=postgres
      - Jwt__Secret=WenArkhass_SuperSecret_2025_Lebanon_PriceMap!
      - Jwt__Issuer=LebanonPriceMap
      - Jwt__Audience=LebanonPriceMap
      - Jwt__ExpiryHours=24
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./lebanonpricemap.client
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://localhost:5000
    depends_on:
      - backend

volumes:
  postgres_data:
