<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1e40af" />

    <!-- Primary SEO -->
    <title>WeinArkhass — Compare Live Prices Across Lebanon</title>
    <meta name="description" content="Find the cheapest groceries, fuel and essentials across Lebanon. Verified prices from trusted retailers, updated daily — Beirut, Tripoli, Sidon, Zahle and more." />
    <meta name="keywords" content="Lebanon prices, grocery prices Lebanon, Beirut prices, fuel prices Lebanon, supermarket Lebanon, price comparison Lebanon, wein arkhas, ون أرخص" />
    <meta name="author" content="WeinArkhass" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://weinarkhass.com/" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="WeinArkhass" />
    <meta property="og:title" content="WeinArkhass — Compare Live Prices Across Lebanon" />
    <meta property="og:description" content="Find the cheapest groceries, fuel and essentials across Lebanon. Verified prices from trusted retailers." />
    <meta property="og:url" content="https://weinarkhass.com/" />
    <meta property="og:image" content="https://weinarkhass.com/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="ar_LB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WeinArkhass — Compare Live Prices Across Lebanon" />
    <meta name="twitter:description" content="Find the cheapest groceries, fuel and essentials across Lebanon." />
    <meta name="twitter:image" content="https://weinarkhass.com/og-image.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">

    <!-- Structured data (organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "WeinArkhass",
      "url": "https://weinarkhass.com",
      "logo": "https://weinarkhass.com/logo.png",
      "description": "Live price comparison platform for groceries and fuel across Lebanon.",
      "sameAs": []
    }
    </script>

    <script>
      const saved = localStorage.getItem('wein-theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.classList.toggle('dark', saved === 'dark');
    </script>
</head>
<body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
