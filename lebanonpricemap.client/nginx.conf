# Map for WebSocket upgrade — required if you ever proxy /hubs/ through nginx.
# Currently the browser calls the backend on :5000 directly so this is unused,
# but it's defined here so the snippet below works if you later put nginx in front.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # SignalR / WebSocket — only used if backend is proxied through this nginx.
    # location /hubs/ {
    #     proxy_pass http://backend:80;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection $connection_upgrade;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_read_timeout 3600s;
    #     proxy_send_timeout 3600s;
    # }

    # SEO-critical: dynamic sitemap from backend
    location = /sitemap.xml {
        proxy_pass http://backend:80/sitemap.xml;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Content-Type application/xml;
        add_header Cache-Control "public, max-age=3600";
    }

    # Static robots.txt with proper content-type
    location = /robots.txt {
        try_files $uri =404;
        add_header Content-Type text/plain;
    }

    # SPA routing - redirect all 404s to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|webp|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
