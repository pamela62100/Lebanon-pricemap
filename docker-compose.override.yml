version: "3.9"

services:
  backend:
    volumes:
      - ./LebanonPriceMap.Server:/src:delegated
      - ~/.nuget/packages:/root/.nuget/packages:cached
    command: ["dotnet", "watch", "run", "--urls", "http://+:80"]
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    ports:
      - "5000:80"
      - "5001:443"

  frontend:
    volumes:
      - ./lebanonpricemap.client:/app:delegated
      - /app/node_modules
    # COMMENT OUT OR REMOVE THIS LINE:
    # command: ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    environment:
      - VITE_API_URL=http://backend:80
    ports:
      - "3000:80"
    depends_on:
      - backend