version: "3.9"

services:
  backend:
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
    ports:
      - "5000:80"
      - "5001:443"

  frontend:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M
    environment:
      - VITE_API_URL=http://backend:80
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
