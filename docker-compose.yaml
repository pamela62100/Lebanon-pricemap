version: "3.9"

networks:
  appnet:
    driver: bridge

services:
  backend:
    build:
      context: ./LebanonPriceMap.Server
      dockerfile: Dockerfile
    image: lebanonpricemap-backend:latest
    ports:
      - "5000:80"
      - "5001:443"
    environment:
      - ASPNETCORE_ENVIRONMENT=${ASPNETCORE_ENVIRONMENT}
      - ConnectionStrings__DefaultConnection=${CONNECTIONSTRING}
    networks:
      - appnet
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: ./lebanonpricemap.client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://backend:80
        - DOCKER_BUILD=true  # Add this build argument
    image: lebanonpricemap-frontend:latest
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://backend:80
      - DOCKER_BUILD=true  # Add this environment variable
    networks:
      - appnet
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3